// all class default binds

// in case anything is stuck
-forward
-back
-moveleft
-moveright
-attack
-attack2
-attack3
-jump
-voicerecord

// weapon slots
bind "1" slot1
bind "2" slot2
bind "3" slot3
bind "4" slot4
bind "5" slot5
bind "6" slot6

// mouse buttons
bind "MOUSE1" "+attack"
bind "MOUSE2" "+attack2"
bind MOUSE3 +attack3;

//Mousewheel Default
bind MWHEELUP invprev;
bind MWHEELDOWN invnext;

hud_fastswitch 1;

// F1-F4 for item preset loadouts
bind "F1" "load_itempreset 0"
bind "F2" "load_itempreset 1"
bind "F3" "load_itempreset 2"
bind "F4" "load_itempreset 3"

// very important voice commands
bind "j" "voicemenu 1 4" // need a dispenser here
bind "f" "voicemenu 1 1" // spy
bind "h" "voicemenu 0 1" // thanks

// suicide
bind "END" "kill"

// misc
bind "p" ""

// auto reload
cl_autoreload 1

// ui stuff
fov_desired 90 // actual fov
viewmodel_fov 90 // viewmodel fov
tf_use_min_viewmodels 1 // minimal viewmodels
tf_scoreboard_mouse_mode 2 // enables mouse on scoreboard only after clicking