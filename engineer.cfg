exec reset
bind "backspace" "exec engineer"

// destroy and build sentry, dispenser, teleporter with one keybind each
alias sentry "destroy 2 0; build 2 0"
alias dispenser "destroy 0 0; build 0 0"
alias tele_in "destroy 1 0; build 1 0"
alias tele_out "destroy 1 1; build 1 1"

bind "MOUSE3" "sentry"
bind "4" "dispenser"
bind "5" "tele_in"
bind "6" "tele_out"

bind MWHEELUP slot1; // shotgun
bind MWHEELDOWN slot3; // wrench